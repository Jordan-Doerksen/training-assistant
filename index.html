<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CROR Training Assistant</title>
  <meta name="description" content="A reference-first, CROR-cited training assistant for conductors. Search rules, signals, and definitions — fast." />
  <meta name="theme-color" content="#1a1e24" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231a1e24'/%3E%3Ccircle cx='16' cy='16' r='7' fill='%23b3322c'/%3E%3Ccircle cx='13.5' cy='13.5' r='2' fill='%23fff' opacity='.55'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#/"><span class="mark" aria-hidden="true"></span>CROR&nbsp;<b>Assistant</b></a>
    <nav class="nav">
      <a class="navlink is-on" data-nav="ref" href="#/">Reference</a>
      <a class="navlink" data-nav="study" href="#/study">Study</a>
      <a class="navlink" data-nav="drills" href="#/drills">Drills</a>
      <a class="navlink" data-nav="progress" href="#/progress">Progress</a>
      <a class="navlink" data-nav="guide" href="#/guide">Guide</a>
    </nav>
    <input id="q" type="search" placeholder="Search rules, signals, definitions…   ( press / )" autocomplete="off" spellcheck="false" aria-label="Search" />
    <span class="hint">Jan 2025 CROR · cited</span>
  </header>

  <div id="firstrun" class="firstrun" hidden>
    <span class="fr-text"><b>New here?</b> Take a 1-minute tour of how to actually study with this.</span>
    <span class="fr-actions">
      <button id="fr-tour" class="dbtn dbtn-go" type="button">Take the tour</button>
      <button id="fr-dismiss" class="fr-x" type="button" aria-label="Dismiss">Not now</button>
    </span>
  </div>

  <main id="view" class="view" aria-live="polite"></main>

  <footer class="foot">
    <svg class="rail-emblem" viewBox="0 0 100 92" role="img" aria-label="Railway track running endlessly toward the horizon">
      <defs>
        <radialGradient id="reGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ffe9bd" stop-opacity=".95" />
          <stop offset="45%" stop-color="#ffba52" stop-opacity=".45" />
          <stop offset="100%" stop-color="#ffba52" stop-opacity="0" />
        </radialGradient>
        <linearGradient id="reGround" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#161f2b" />
          <stop offset="100%" stop-color="#0a0e14" />
        </linearGradient>
        <clipPath id="reClip"><circle cx="50" cy="46" r="45" /></clipPath>
      </defs>
      <g clip-path="url(#reClip)">
        <rect x="0" y="0" width="100" height="92" fill="url(#reGround)" />
        <line x1="50" y1="46" x2="3" y2="92" stroke="#46586e" stroke-width="2.6" />
        <line x1="50" y1="46" x2="97" y2="92" stroke="#46586e" stroke-width="2.6" />
        <g class="re-track" fill="#9fadbf">
          <rect class="re-tie" x="24" y="44.3" width="52" height="3.4" rx="1" />
          <rect class="re-tie" x="24" y="44.3" width="52" height="3.4" rx="1" />
          <rect class="re-tie" x="24" y="44.3" width="52" height="3.4" rx="1" />
          <rect class="re-tie" x="24" y="44.3" width="52" height="3.4" rx="1" />
          <rect class="re-tie" x="24" y="44.3" width="52" height="3.4" rx="1" />
          <rect class="re-tie" x="24" y="44.3" width="52" height="3.4" rx="1" />
        </g>
        <circle class="re-light" cx="50" cy="46" r="8" fill="url(#reGlow)" />
        <circle cx="50" cy="46" r="1.9" fill="#fff7e6" />
      </g>
      <circle cx="50" cy="46" r="45" fill="none" stroke="#2c3340" stroke-width="2" />
    </svg>
    <span class="foot-text">Reference + drill assistant · built from the Jan 28 2025 CROR ·
    <strong>study aid, not the official rulebook</strong> — verify against the CROR &amp; your SME.</span>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
